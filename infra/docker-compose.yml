name: content-factory

services:
  db:
    image: postgres:16-alpine
    container_name: content-factory-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-content_factory}
      POSTGRES_USER: ${POSTGRES_USER:-content_factory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-content_factory_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-content_factory} -d ${POSTGRES_DB:-content_factory}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: content-factory-api
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://content_factory:content_factory_dev@db:5432/content_factory}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    image: nginx:1.27-alpine
    container_name: content-factory-web
    ports:
      - "${WEB_PORT:-5173}:80"
    volumes:
      - ../apps/web/public:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_healthy

volumes:
  pg_data:
