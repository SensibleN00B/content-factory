<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Factory Web</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #0b132b, #1c2541);
        color: #f5f7fa;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      .card {
        max-width: 760px;
        margin: 24px;
        padding: 28px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.16);
        backdrop-filter: blur(6px);
      }
      h1 {
        margin-top: 0;
        font-size: 28px;
      }
      p {
        line-height: 1.5;
      }
      code {
        background: rgba(255, 255, 255, 0.12);
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Content Factory MVP</h1>
      <p>
        Web service is running. Frontend scaffold (`FE-001`) will replace this placeholder.
      </p>
      <p>
        API health: <code>http://localhost:8000/health</code>
      </p>
      <p>
        Compose stack target: <code>api + db + web</code>
      </p>
    </main>
  </body>
</html>
